<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UZEM Mod</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <span class="logo-icon">🎙️</span>
        <div>
          <h1>UZEM Mod</h1>
          <p>Unlimited & Free Audio → Text</p>
        </div>
        <button id="popoutBtn" class="icon-btn" title="Ayrı Pencerede Aç">↗️</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="main">Ana Sayfa</button>
        <button class="tab-btn" data-tab="history">Geçmiş</button>
        <button class="tab-btn" data-tab="settings">⚙️ Ayarlar</button>
      </div>
    </header>

    <!-- ANA SEKME -->
    <div id="tab-main" class="tab-content active">
      <div class="status-panel">
        <span class="status-dot" id="statusDot"></span>
        <span id="status">Hazır</span>
      </div>

      <div class="controls">
        <button id="startBtn">▶ Başlat</button>
        <button id="stopBtn" disabled>⏹ Durdur</button>
        <button id="clearBtn" title="Temizle">🗑️</button>
      </div>

      <div class="lang-row">
        <label for="langSelect">Dil:</label>
        <select id="langSelect">
          <option value="en-US" selected>English</option>
          <option value="tr-TR">Türkçe</option>
          <option value="de-DE">Deutsch</option>
          <option value="ar-SA">العربية</option>
          <option value="fr-FR">Français</option>
        </select>
        <button id="copyBtn" title="Kopyala">📋 Kopyala</button>
      </div>

      <div class="output-container">
        <div class="output-header">
          <span>Transkript</span>
          <span id="wordCount">0 kelime</span>
        </div>
        <div id="transcript" class="transcript-box">
          <span class="placeholder">Dinlemeyi başlatınca ses metne buraya yazılacak...</span>
        </div>
      </div>

      <div id="progressBar" class="progress-bar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
        <span id="progressLabel">İşleniyor...</span>
      </div>
    </div>

    <!-- AYARLAR SEKMESİ -->
    <div id="tab-settings" class="tab-content">
      <div class="settings-group">
        <label for="apiKeyInput">🔑 Deepgram API Anahtarı</label>
        <div class="api-key-row">
          <input
            type="password"
            id="apiKeyInput"
            placeholder="Deepgram API Key"
            autocomplete="off"
          />
          <button id="toggleKeyBtn" title="Göster/Gizle">👁️</button>
        </div>
        <p class="hint">
          <b>Not:</b> Deepgram üzerinden aldığınız anahtarı buraya girin.<br>
          <a href="https://console.deepgram.com/signup" target="_blank">Deepgram Kayıt</a>
        </p>
      </div>
      <button id="saveSettingsBtn" class="save-btn">💾 Ayarları Kaydet</button>
      <div id="saveMsg" class="save-msg"></div>

      <div class="settings-footer">
        <div class="credit">
          bu eklenti <b>Yushiro</b> tarafından yapılmıştır <span class="heart">❤️</span>
        </div>
        <a href="https://github.com/salihelsalih" target="_blank" class="github-link" title="GitHub">
          <svg class="github-icon" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span class="github-text">github</span>
        </a>
      </div>
    </div>

    <!-- GEÇMİŞ SEKMESİ -->
    <div id="tab-history" class="tab-content">
      <div class="history-list" id="historyList">
        <p class="empty-msg">Henüz kaydedilmiş bir oturum yok.</p>
      </div>
      <button id="clearHistoryBtn" class="danger-btn">🗑️ Tüm Geçmişi Sil</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
